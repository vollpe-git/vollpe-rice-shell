style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "Όεα"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "≤░Ηξ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[rust]
