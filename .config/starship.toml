# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# rosa = #f687a7
# viola = #965ebd

format = """
[ΌΔΛ](fg:#3c3c3c)\
[ΌΔΛ](fg:#643bac bg:#3c3c3c)\
[ΌΔΛ](fg:#965ebd bg:#643bac)\
$os\
[ΌΔΙ](bg:#f687a7 fg:#965ebd)\
$username\
[ΌΔΙ](bg:#00b3ff fg:#f687a7)\
$directory\
[ΌΔΙ](fg:#00b3ff bg:#43c7ff)\
[ΌΔΙ](fg:#43c7ff bg:#00ffff)\
[ΌΔΙ ](fg:#00ffff)\
"""

# You can also replace your username with a neat symbol like ΎΕι  or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#f687a7"
style_root = "bg:##f687a7"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#965ebd"
disabled = false

[os.symbols]
Arch = " ΎΝΔ "

[directory]
style = "bg:#00b3ff"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ≤░ΙβΎΕς "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ≤░Ιβ " = " ≤░ΙβΎΕς "

[c]
symbol = "Όαη "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = "Όαζ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "ΎΝΙ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "ΌΚ╡ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Όαυ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "ΎΡα"
style = "bg:#FCA17D"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#FCA17D"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "Όαπ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "Όζ╖ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "ΌΚΨ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
